<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="studio.title_doc">3D Studio — ZhiYing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/teams.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="/static/i18n.js"></script>
    <script src="/static/i18n.js"></script>
    <script src="/static/furniture3d.js?v=20260327"></script>
    <style>
        /* Studio-specific styles */
        .studio-layout { display: flex; height: 100vh; background: var(--bg); color: var(--text); }
        .studio-sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--card-border); display: flex; flex-direction: column; overflow-y: auto; }
        .studio-main { flex: 1; display: flex; flex-direction: column; }
        .studio-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--sidebar); border-bottom: 1px solid var(--card-border); min-height: 48px; }
        .studio-canvas-wrap { flex: 1; position: relative; }
        .studio-canvas-wrap canvas { width: 100% !important; height: 100% !important; display: block; }

        /* Sidebar sections */
        .studio-sidebar .sidebar-header { padding: 16px; border-bottom: 1px solid var(--card-border); }
        .studio-sidebar .sidebar-header h2 { margin: 0; font-size: 18px; }
        .asset-tabs { display: flex; border-bottom: 1px solid var(--card-border); }
        .asset-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 12px; cursor: pointer; border: none; background: none; color: var(--text2); transition: all .2s; }
        .asset-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .asset-tab:hover { color: var(--text); }

        .asset-list { padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .asset-item { display: flex; flex-direction: column; align-items: center; padding: 10px 6px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; cursor: grab; transition: all .2s; font-size: 11px; text-align: center; gap: 4px; }
        .asset-item:hover { border-color: var(--accent); background: rgba(244,63,94,0.08); transform: translateY(-2px); }
        .asset-item .emoji { font-size: 24px; }
        .asset-item .label { color: var(--text2); line-height: 1.2; }
        .asset-item.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(244,63,94,0.3); }

        /* Team selector */
        .team-select-group { padding: 12px 16px; border-bottom: 1px solid var(--card-border); }
        .team-select-group label { font-size: 12px; color: var(--text3); margin-bottom: 4px; display: block; }
        .team-select-group select { width: 100%; }

        /* Placed items list */
        .placed-section { padding: 8px 16px; border-top: 1px solid var(--card-border); flex: 1; overflow-y: auto; }
        .placed-section h4 { font-size: 12px; color: var(--text3); margin: 0 0 8px 0; }
        .placed-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: var(--card-bg); border-radius: 6px; margin-bottom: 4px; font-size: 12px; }
        .placed-item .pi-name { flex: 1; }
        .placed-item button { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px 4px; }
        .placed-item button:hover { color: #f43f5e; }
        .agent-assign-select { padding:2px 4px; font-size:10px; background:#0c0e18; color:#e2e8f0; border:1px solid #1e2030; border-radius:4px; max-width:100px; font-family:var(--font); cursor:pointer; }
        .agent-assign-select:focus { border-color:#22d3ee; outline:none; }

        /* Agent picker popup */
        .desk-agent-popup { position:fixed; z-index:9999; display:none; background:var(--card-bg); border:1px solid var(--card-border); border-radius:10px; padding:0; min-width:240px; max-width:320px; box-shadow:0 8px 32px rgba(0,0,0,0.6); overflow:hidden; animation: popIn 0.15s ease; }
        .desk-agent-popup.open { display:block; }
        .desk-agent-popup-header { padding:10px 14px; border-bottom:1px solid var(--card-border); font-size:13px; font-weight:700; color:var(--text); display:flex; justify-content:space-between; align-items:center; }
        .desk-agent-popup-header .capacity-badge { font-size:10px; font-weight:500; color:var(--text3); background:rgba(34,211,238,0.15); padding:2px 8px; border-radius:10px; }
        .desk-agent-popup-list { max-height:300px; overflow-y:auto; padding:4px 0; }
        .desk-agent-opt { padding:8px 14px; cursor:pointer; font-size:12px; color:var(--text2); transition:all 0.15s; display:flex; align-items:center; gap:8px; }
        .desk-agent-opt:hover:not(.disabled) { background:rgba(34,211,238,0.1); color:var(--text); }
        .desk-agent-opt.active { background:rgba(34,211,238,0.15); color:#22d3ee; font-weight:600; }
        .desk-agent-opt.disabled { opacity:0.35; cursor:not-allowed; pointer-events:none; }
        .desk-agent-opt.full-disabled { opacity:0.5; cursor:not-allowed; }
        .desk-agent-opt .agent-dot { width:8px; height:8px; border-radius:50%; background:#22d3ee; flex-shrink:0; }
        .desk-agent-opt .agent-dot.taken { background:#f43f5e; }
        .desk-agent-opt label { display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; }
        .desk-agent-opt label input[type=checkbox] { accent-color:#22d3ee; cursor:pointer; width:14px; height:14px; }
        .desk-agent-opt .taken-badge { font-size:9px; color:#f43f5e; margin-left:auto; white-space:nowrap; }
        .desk-agent-opt .release-btn { font-size:9px; color:#f59e0b; background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.3); border-radius:4px; padding:1px 6px; margin-left:auto; cursor:pointer; white-space:nowrap; transition:all 0.15s; }
        .desk-agent-opt .release-btn:hover { background:rgba(245,158,11,0.3); color:#fbbf24; }
        @keyframes popIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }

        /* Toolbar buttons */
        .tb-btn { padding: 6px 14px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card-bg); color: var(--text); cursor: pointer; font-size: 13px; transition: all .2s; }
        .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tb-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .tb-label { font-size: 12px; color: var(--text3); margin-right: 4px; }

        /* Status bar */
        .status-bar { display: flex; justify-content: space-between; padding: 6px 16px; background: var(--sidebar); border-top: 1px solid var(--card-border); font-size: 11px; color: var(--text3); }

        /* Red glow pulse for team selector warning */
        @keyframes teamGlow {
            0%, 100% { box-shadow: 0 0 8px 2px rgba(244,63,94,0.0); border-color: var(--card-border); }
            50% { box-shadow: 0 0 18px 6px rgba(244,63,94,0.7); border-color: #f43f5e; }
        }
        .team-select-group.glow-warn {
            animation: teamGlow 0.5s ease-in-out 3;
            border-radius: 10px;
            border: 2px solid #f43f5e;
        }
    </style>
</head>
<body>

<div class="studio-layout">
    <!-- Left: Asset Palette -->
    <div class="studio-sidebar">
        <div class="sidebar-header">
            <h2 data-i18n="studio.title_main">🎨 3D Studio</h2>
            <a href="/teams" style="font-size:12px; color:var(--text3);" data-i18n="studio.back_teams">← Quay lại Teams</a>
        </div>

        <div class="team-select-group">
            <label data-i18n="studio.team_edit">Team đang chỉnh sửa</label>
            <div style="display:flex; gap:6px; align-items:center;">
                <select id="team-select" class="input" onchange="onTeamSelect()" style="flex:1;"></select>
                <button onclick="openQuickTeamModal()" data-i18n-title="studio.btn_new_ai" title="Tạo team mới bằng AI" style="width:34px; height:34px; border-radius:8px; border:1px solid var(--accent); background:transparent; color:var(--accent); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s;" onmouseover="this.style.background='var(--accent)';this.style.color='#fff';" onmouseout="this.style.background='transparent';this.style.color='var(--accent)';">+</button>
            </div>
        </div>

        <div class="team-select-group">
            <label data-i18n="studio.room_size">📐 Kích thước phòng</label>
            <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
                <span style="font-size:11px;color:var(--text3);min-width:28px;" data-i18n="studio.width">Rộng</span>
                <input type="range" id="room-width" min="8" max="60" value="16" step="2"
                       oninput="resizeRoom()" style="flex:1;">
                <span id="room-w-val" style="font-size:11px;min-width:24px;">16</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
                <span style="font-size:11px;color:var(--text3);min-width:28px;" data-i18n="studio.depth">Dài</span>
                <input type="range" id="room-depth" min="8" max="60" value="12" step="2"
                       oninput="resizeRoom()" style="flex:1;">
                <span id="room-d-val" style="font-size:11px;min-width:24px;">12</span>
            </div>
        </div>

        <div class="asset-tabs">
            <button class="asset-tab active" onclick="filterAssets('all', this)" data-i18n="studio.tab_all">Tất cả</button>
            <button class="asset-tab" onclick="filterAssets('furniture', this)" data-i18n="studio.tab_furn">🪑 Nội thất</button>
            <button class="asset-tab" onclick="filterAssets('decoration', this)" data-i18n="studio.tab_deco">🌿 Trang trí</button>
            <button class="asset-tab" onclick="filterAssets('structure', this)" data-i18n="studio.tab_struct">🧱 Kiến trúc</button>
        </div>

        <div id="asset-list" class="asset-list"></div>

        <div class="placed-section">
            <h4>📦 <span data-i18n="studio.placed">Đã đặt</span> (<span id="placed-count">0</span>)</h4>
            <div id="placed-list"></div>
        </div>
    </div>

    <!-- Center: 3D Canvas -->
    <div class="studio-main">
        <div class="studio-toolbar">
            <span class="tb-label" data-i18n="studio.tools">Công cụ:</span>
            <button class="tb-btn active" id="tool-place" onclick="setTool('place')" data-i18n="studio.tool_place">📌 Đặt</button>
            <button class="tb-btn" id="tool-move" onclick="setTool('move')" data-i18n="studio.tool_move">✋ Di chuyển</button>
            <button class="tb-btn" id="tool-rotate" onclick="setTool('rotate')" data-i18n="studio.tool_rotate">🔄 Xoay</button>
            <button class="tb-btn" id="tool-delete" onclick="setTool('delete')" data-i18n="studio.tool_delete">🗑️ Xóa</button>
            <div style="flex:1"></div>
            <button class="tb-btn" onclick="openAIGenerateModal()" style="background:rgba(99,102,241,0.1); border-color:var(--accent); color:var(--text); margin-right:8px;" data-i18n="studio.tool_ai">🪄 Tạo bằng AI</button>
            <button class="tb-btn" onclick="clearScene()" data-i18n="studio.tool_clear">🧹 Xóa hết</button>
            <button class="tb-btn" onclick="saveScene()" style="background:var(--accent); color:#fff; border-color:var(--accent);" data-i18n="studio.tool_save">💾 Lưu</button>
        </div>
        <div class="studio-canvas-wrap" id="studio-canvas"></div>
        <div class="status-bar">
            <span id="status-text" data-i18n="studio.status_ready">Sẵn sàng — chọn vật phẩm bên trái rồi bấm vào sàn để đặt</span>
            <span id="status-pos">x: 0, z: 0</span>
        </div>
    </div>
</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- Agent Picker Popup -->
<div id="desk-agent-popup" class="desk-agent-popup">
    <div class="desk-agent-popup-header" data-i18n="studio.assign_agent">🤖 Gán agent cho bàn này</div>
    <div id="desk-agent-popup-list" class="desk-agent-popup-list"></div>
</div>

<!-- AI Generate Modal -->
<div class="modal-overlay" id="ai-generate-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:10000; align-items:center; justify-content:center;">
  <div class="modal" style="background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; width:100%; max-width:500px; padding:20px; box-shadow:0 10px 40px rgba(0,0,0,0.5);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; border-bottom:1px solid var(--card-border); padding-bottom:12px;">
      <h3 style="margin:0; font-size:16px;">✨ Tạo Phòng làm việc bằng AI</h3>
      <button onclick="closeAIGenerateModal()" style="background:none; border:none; color:var(--text); cursor:pointer; font-size:16px;">✖</button>
    </div>
    <div style="margin-bottom:16px;">
      <label style="display:block; font-size:12px; color:var(--text2); margin-bottom:8px;" data-i18n="studio.ai_prompt_lbl">Nhập prompt mô tả phòng</label>
      <textarea id="ai-prompt-input" rows="4" style="width:100%; padding:10px; background:var(--sidebar); border:1px solid var(--card-border); border-radius:8px; color:var(--text); font-family:inherit; resize:vertical; outline:none;" data-i18n-placeholder="studio.ai_room_prompt" placeholder="Ví dụ: Tạo phòng làm việc hiện đại..."></textarea>
    </div>
    <div style="display:flex; gap:12px; margin-bottom:16px;">
      <div style="flex:1;">
        <label style="display:block; font-size:12px; color:var(--text2); margin-bottom:8px;">AI Provider</label>
        <select id="ai-provider-select" onchange="onAiProviderChange()" style="width:100%; padding:8px; background:var(--sidebar); border:1px solid var(--card-border); border-radius:8px; color:var(--text); outline:none;">
          <option value="gemini">🔷 Gemini</option>
          <option value="ollama">🤖 Ollama (Local)</option>
          <option value="chatgpt">🟢 ChatGPT</option>
          <option value="claude">🟠 Claude</option>
        </select>
      </div>
      <div style="flex:1;">
        <label style="display:block; font-size:12px; color:var(--text2); margin-bottom:8px;">Model</label>
        <input id="ai-model-input" type="text" value="gemini-2.5-flash" style="width:100%; padding:8px; background:var(--sidebar); border:1px solid var(--card-border); border-radius:8px; color:var(--text); outline:none;">
      </div>
    </div>
    <div id="ai-gen-status" style="display:none; text-align:center; padding:10px 0; color:var(--accent); font-size:13px;">
      <span style="display:inline-block; animation:spin 1s linear infinite;">⏳</span> Đang phân tích team và thiết kế 3D...
    </div>
    <style>@keyframes spin { 100% { transform:rotate(360deg); } }</style>
    <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:20px;">
      <button onclick="closeAIGenerateModal()" class="tb-btn" data-i18n="studio.btn_cancel">Hủy</button>
      <button id="btn-ai-generate" onclick="submitAiGenerate()" class="tb-btn" style="background:var(--accent); color:#fff; border-color:var(--accent);" data-i18n="studio.btn_auto_create">🪄 Tạo tự động</button>
    </div>
  </div>
</div>

<!-- Quick Team Modal -->
<div class="modal-overlay" id="quick-team-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:10001; align-items:center; justify-content:center;">
  <div class="modal" style="background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; width:100%; max-width:520px; padding:24px; box-shadow:0 10px 40px rgba(0,0,0,0.5);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; border-bottom:1px solid var(--card-border); padding-bottom:12px;">
      <h3 style="margin:0; font-size:16px;">⚡ Tạo Team nhanh bằng AI</h3>
      <button onclick="closeQuickTeamModal()" style="background:none; border:none; color:var(--text); cursor:pointer; font-size:16px;">✖</button>
    </div>
    <div style="margin-bottom:16px;">
      <label style="display:block; font-size:12px; color:var(--text2); margin-bottom:8px;" data-i18n="studio.ai_team_lbl">Mô tả team bạn muốn tạo</label>
      <textarea id="qt-description" rows="3" style="width:100%; padding:10px; background:var(--sidebar); border:1px solid var(--card-border); border-radius:8px; color:var(--text); font-family:inherit; resize:vertical; outline:none;" data-i18n-placeholder="studio.ai_team_prompt" placeholder="VD: Team..."></textarea>
    </div>
    <div style="display:flex; gap:12px; margin-bottom:16px;">
      <div style="flex:1;">
        <label style="display:block; font-size:12px; color:var(--text2); margin-bottom:8px;">AI Provider</label>
        <select id="qt-provider" onchange="onQtProviderChange()" style="width:100%; padding:8px; background:var(--sidebar); border:1px solid var(--card-border); border-radius:8px; color:var(--text); outline:none;">
          <option value="gemini">🔷 Gemini</option>
          <option value="ollama">🤖 Ollama</option>
          <option value="chatgpt">🟢 ChatGPT</option>
          <option value="claude">🟠 Claude</option>
        </select>
      </div>
      <div style="flex:1;">
        <label style="display:block; font-size:12px; color:var(--text2); margin-bottom:8px;">Model</label>
        <input id="qt-model" type="text" value="gemini-2.5-flash" style="width:100%; padding:8px; background:var(--sidebar); border:1px solid var(--card-border); border-radius:8px; color:var(--text); outline:none;">
      </div>
    </div>

    <div id="qt-status" style="display:none; text-align:center; padding:10px 0; color:var(--accent); font-size:13px;">
      <span style="display:inline-block; animation:spin 1s linear infinite;">⏳</span> Đang phân tích và tạo team...
    </div>
    <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:16px;">
      <button onclick="closeQuickTeamModal()" class="tb-btn" data-i18n="studio.btn_cancel">Hủy</button>
      <button id="btn-qt-create" onclick="submitQuickTeam()" class="tb-btn" style="background:var(--accent); color:#fff; border-color:var(--accent);" data-i18n="studio.btn_team_create">⚡ Tạo Team</button>
    </div>
  </div>
</div>

<script>
// ── State ──
const API = '/api/v1';
let assets = [];
let teams = [];
let currentTeamId = null;
let placedAssets = []; // { id, asset_id, x, z, rotation, scale, mesh, custom_color }
let selectedAssetId = null;
let currentTool = 'place';
let scene, camera, renderer, controls, clock;
let groundMesh, gridHelper;
let ghostMesh = null; // Preview mesh following cursor
let placedMeshes = []; // Three.js meshes
let roomW = 16, roomD = 12;
let studioAgents = [];
const GRID_SNAP = 0.5;

// ── Init ──
async function init() {
    await loadI18nFromApi();
    await Promise.all([loadAssets(), loadTeams(), loadStudioAgents()]);
    renderAssetList();
    initScene();
}

async function loadStudioAgents() {
    try {
        const res = await fetch('/api/v1/agents');
        const data = await res.json();
        studioAgents = data.agents || data || [];
    } catch (e) { studioAgents = []; }
}

// Built-in asset catalog (fallback if API unavailable)
const BUILTIN_ASSETS = [
    {id:"desk_modern",name:"Bàn hiện đại",category:"furniture",emoji:"🖥️",mesh:"box",size:[1.6,0.07,0.9],color:"#f0ebe4",yOffset:0.72},
    {id:"desk_wood",name:"Bàn gỗ cổ điển",category:"furniture",emoji:"📚",mesh:"box",size:[1.4,0.06,0.8],color:"#5c3a1e",yOffset:0.45},
    {id:"chair_office",name:"Ghế xoay",category:"furniture",emoji:"🪑",mesh:"box",size:[0.5,0.06,0.5],color:"#2d3250",yOffset:0.48},
    {id:"sofa",name:"Sofa",category:"furniture",emoji:"🛋️",mesh:"box",size:[1.8,0.5,0.8],color:"#3d4a8a",yOffset:0.25},
    {id:"bookshelf",name:"Tủ sách",category:"furniture",emoji:"📕",mesh:"box",size:[1.2,2.0,0.4],color:"#6b4226",yOffset:1.0},
    {id:"table_round",name:"Bàn tròn",category:"furniture",emoji:"🍽️",mesh:"cylinder",size:[0.6,0.72,0.6],color:"#d4c8b0",yOffset:0.36},
    {id:"cabinet",name:"Tủ hồ sơ",category:"furniture",emoji:"🗄️",mesh:"box",size:[0.6,1.2,0.5],color:"#8a8a8a",yOffset:0.6},
    {id:"plant_pot",name:"Chậu cây",category:"decoration",emoji:"🌿",mesh:"cylinder",size:[0.25,0.8,0.25],color:"#22c55e",yOffset:0.4},
    {id:"plant_tall",name:"Cây cao",category:"decoration",emoji:"🌳",mesh:"cylinder",size:[0.2,1.8,0.2],color:"#228B22",yOffset:0.9},
    {id:"plant_cactus",name:"Xương rồng",category:"decoration",emoji:"🌵",mesh:"cylinder",size:[0.12,0.6,0.12],color:"#2e8b57",yOffset:0.3},
    {id:"aquarium_small",name:"Bể cá nhỏ",category:"decoration",emoji:"🐠",mesh:"sphere",size:[0.18,0.3,0.18],color:"#87ceeb",yOffset:0.15},
    {id:"aquarium_large",name:"Bể cá lớn",category:"decoration",emoji:"🐟",mesh:"box",size:[1.2,0.55,0.45],color:"#1c7ed6",yOffset:0.6},

async function loadAssets() {
    try {
        const res = await fetch(`${API}/studio3d/assets`);
        if (res.ok) {
            const data = await res.json();
            assets = data.assets || BUILTIN_ASSETS;
        } else {
            assets = BUILTIN_ASSETS;
        }
    } catch (e) {
        console.warn('API unavailable, using built-in assets');
        assets = BUILTIN_ASSETS;
    }
}

async function loadTeams() {
    try {
        const res = await fetch(`${API}/multi-agents/teams`);
        const data = await res.json();
        teams = data.teams || [];
        const sel = document.getElementById('team-select');
        sel.innerHTML = '<option value="" data-i18n="studio.sel_team">-- Chọn team --</option>'
            + teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    } catch (e) { console.error('Failed to load teams', e); }
}

async function loadScene(teamId) {
    try {
        const res = await fetch(`${API}/studio3d/scenes/${teamId}`);
        const data = await res.json();
        const scn = data.scene || {};
        // Restore room size
        if (scn.room_width) { roomW = scn.room_width; document.getElementById('room-width').value = roomW; document.getElementById('room-w-val').textContent = roomW; }
        if (scn.room_depth) { roomD = scn.room_depth; document.getElementById('room-depth').value = roomD; document.getElementById('room-d-val').textContent = roomD; }
        resizeRoom();
        clearAllMeshes();
        (scn.assets || []).forEach(a => {
            addPlacedAsset(a.asset_id, a.x, a.z, a.rotation || 0, a.scale || 1, false, a.agent_id || '', a.agent_ids || []);
        });
        updatePlacedList();
    } catch (e) { console.error('Failed to load scene', e); }
}

async function saveScene() {
    if (!currentTeamId) { toast('⚠️ ' + T('studio.err_sel_team_save'), 'error'); return; }
    try {
        const body = {
            team_id: currentTeamId,
            room_width: roomW,
            room_depth: roomD,
            assets: placedAssets.map(p => ({
                asset_id: p.asset_id, x: p.x, z: p.z, rotation: p.rotation, scale: p.scale,
                agent_id: p.agent_id || '',
                agent_ids: p.agent_ids || []
            })),
        };
        await fetch(`${API}/studio3d/scenes/${currentTeamId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        toast('💾 ' + T('studio.saved_success'), 'success');
    } catch (e) { toast(T('studio.err_save') + ': ' + e.message, 'error'); }
}

function onTeamSelect() {
    currentTeamId = document.getElementById('team-select').value;
    if (currentTeamId) {
        loadScene(currentTeamId);
        setStatus(`${T('studio.editing_team')}: ${teams.find(t => t.id === currentTeamId)?.name || currentTeamId}`);
    }
}

// ── Asset palette ──
function renderAssetList(filter = 'all') {
    const list = document.getElementById('asset-list');
    const filtered = filter === 'all' ? assets : assets.filter(a => a.category === filter);
    list.innerHTML = filtered.map(a => `
        <div class="asset-item ${selectedAssetId === a.id ? 'selected' : ''}"
             onclick="selectAsset('${a.id}')" title="${T('studio.item.' + a.id) || a.name}">
            <span class="emoji">${a.emoji}</span>
            <span class="label" data-i18n="studio.item.${a.id}">${a.name}</span>
        </div>
    `).join('');
    if (typeof applyI18n === 'function') setTimeout(applyI18n, 10);
}

function filterAssets(cat, btn) {
    document.querySelectorAll('.asset-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAssetList(cat);
}

// ── Room resize ──
function resizeRoom() {
    roomW = parseInt(document.getElementById('room-width').value) || 16;
    roomD = parseInt(document.getElementById('room-depth').value) || 12;
    document.getElementById('room-w-val').textContent = roomW;
    document.getElementById('room-d-val').textContent = roomD;

    if (!groundMesh || !scene) return;

    // Replace floor geometry
    groundMesh.geometry.dispose();
    groundMesh.geometry = new THREE.PlaneGeometry(roomW, roomD);

    // Replace grid
    if (gridHelper) { scene.remove(gridHelper); gridHelper.geometry.dispose(); }
    const gridSize = Math.max(roomW, roomD);
    gridHelper = new THREE.GridHelper(gridSize, gridSize * 2, 0x4a4a4a, 0x2a2a3a);
    gridHelper.position.y = 0.01;
    gridHelper.material.opacity = 0.5;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // Adjust camera constraints for bigger rooms
    if (controls) {
        controls.maxDistance = Math.max(40, gridSize * 2);
    }

    setStatus(`📐 ${T('studio.room_status')}: ${roomW} × ${roomD}`);
}

function selectAsset(id) {
    if (!currentTeamId) {
        toast('⚠️ ' + T('studio.err_sel_team_first'), 'error');
        // Red glow pulse on team selector
        const teamGroup = document.querySelector('.team-select-group');
        if (teamGroup) {
            teamGroup.classList.remove('glow-warn');
            void teamGroup.offsetWidth; // force reflow to restart animation
            teamGroup.classList.add('glow-warn');
            setTimeout(() => teamGroup.classList.remove('glow-warn'), 1600);
        }
        return;
    }
    selectedAssetId = (selectedAssetId === id) ? null : id;
    renderAssetList();
    removeGhost();
    if (selectedAssetId) {
        createGhost(selectedAssetId);
        setTool('place');
        setStatus(`${T('studio.selected')}: ${T('studio.item.' + id) || assets.find(a => a.id === id)?.name} — ${T('studio.click_to_place')}`);
    }
}

// ── Tools ──
function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tool-' + tool)?.classList.add('active');
    if (tool !== 'place') removeGhost();
    // Disable orbit controls when Move tool is active so left-click drags objects
    if (controls) {
        controls.enabled = (tool !== 'move');
    }
    setStatus({
        place: 'Chọn vật phẩm bên trái rồi bấm vào sàn',
        move: 'Bấm giữ vật phẩm rồi kéo để di chuyển (cuộn chuột để zoom)',
        rotate: 'Bấm vật phẩm để xoay 90°',
        delete: 'Bấm vật phẩm để xóa',
    }[tool] || '');
}

// ── 3D Scene ──
function initScene() {
    const container = document.getElementById('studio-canvas');
    const W = container.clientWidth, H = container.clientHeight;

    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x080a12, 0.01);

    camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 200);
    camera.position.set(12, 10, 12);
    camera.lookAt(0, 0, 0);

    const canvas = document.createElement('canvas');
    container.appendChild(canvas);
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x060810);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;

    controls = new THREE.OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 4;
    controls.maxDistance = 40;

    clock = new THREE.Clock();

    // Lighting
    scene.add(new THREE.AmbientLight(0x667788, 0.7));
    const sun = new THREE.DirectionalLight(0xffeedd, 0.9);
    sun.position.set(10, 15, 8); sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    const d = 20;
    sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
    sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
    scene.add(sun);
    scene.add(new THREE.PointLight(0xf43f5e, 0.3, 20).position.clone().set(-6, 4, 5) && new THREE.PointLight(0xf43f5e, 0.3, 20));
    scene.add(new THREE.PointLight(0x22d3ee, 0.2, 18));

    // Ground
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xd4c8b0, roughness: 0.85 });
    groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomD), floorMat);
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);

    // Grid
    const gridSize = Math.max(roomW, roomD);
    gridHelper = new THREE.GridHelper(gridSize, gridSize * 2, 0x4a4a4a, 0x2a2a3a);
    gridHelper.position.y = 0.01;
    gridHelper.material.opacity = 0.5;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // Dark ground beyond
    const farGround = new THREE.Mesh(new THREE.PlaneGeometry(100, 100),
        new THREE.MeshStandardMaterial({ color: 0x10121c, roughness: 0.9 }));
    farGround.rotation.x = -Math.PI / 2;
    farGround.position.y = -0.02;
    scene.add(farGround);

    // Events
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(groundMesh);
        if (hits.length > 0) {
            const p = hits[0].point;
            const sx = Math.round(p.x / GRID_SNAP) * GRID_SNAP;
            const sz = Math.round(p.z / GRID_SNAP) * GRID_SNAP;
            document.getElementById('status-pos').textContent = `x: ${sx.toFixed(1)}, z: ${sz.toFixed(1)}`;
            if (ghostMesh) {
                ghostMesh.position.set(sx, ghostMesh.userData.yOff || 0.5, sz);
            }
        }
    });

    let dragTarget = null;
    let dragOffset = { x: 0, z: 0 };

    // Helper: collect all descendant meshes from placed assets for raycasting
    function _collectPlacedMeshes() {
        const meshes = [];
        placedAssets.forEach(p => {
            if (!p.mesh) return;
            if (p.mesh.isMesh) {
                meshes.push(p.mesh);
            } else {
                // It's a Group — traverse all descendant meshes
                p.mesh.traverse(child => { if (child.isMesh) meshes.push(child); });
            }
        });
        return meshes;
    }

    // Helper: find the placed asset from a hit object by walking up to the root with placedId
    function _findPlacedFromHit(hitObj) {
        while (hitObj && !hitObj.userData.placedId) hitObj = hitObj.parent;
        if (!hitObj || !hitObj.userData.placedId) return null;
        return placedAssets.find(p => p.id === hitObj.userData.placedId);
    }

    canvas.addEventListener('mousedown', (e) => {
        if (currentTool === 'move') {
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(_collectPlacedMeshes(), false);
            if (hits.length > 0) {
                const pa = _findPlacedFromHit(hits[0].object);
                if (pa && pa.mesh) {
                    dragTarget = pa.mesh;
                    controls.enabled = false;
                    const gHits = raycaster.intersectObject(groundMesh);
                    if (gHits.length) {
                        dragOffset.x = dragTarget.position.x - gHits[0].point.x;
                        dragOffset.z = dragTarget.position.z - gHits[0].point.z;
                    }
                }
            }
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if (dragTarget && currentTool === 'move') {
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(groundMesh);
            if (hits.length > 0) {
                const sx = Math.round((hits[0].point.x + dragOffset.x) / GRID_SNAP) * GRID_SNAP;
                const sz = Math.round((hits[0].point.z + dragOffset.z) / GRID_SNAP) * GRID_SNAP;
                dragTarget.position.x = sx;
                dragTarget.position.z = sz;
            }
        }
    });

    canvas.addEventListener('mouseup', () => {
        if (dragTarget) {
            // Save new position
            const pa = placedAssets.find(p => p.id === dragTarget.userData.placedId);
            if (pa) { pa.x = dragTarget.position.x; pa.z = dragTarget.position.z; }
            dragTarget = null;
            controls.enabled = true;
            updatePlacedList();
        }
    });

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        if (currentTool === 'place' && selectedAssetId) {
            const hits = raycaster.intersectObject(groundMesh);
            if (hits.length > 0) {
                const p = hits[0].point;
                const sx = Math.round(p.x / GRID_SNAP) * GRID_SNAP;
                const sz = Math.round(p.z / GRID_SNAP) * GRID_SNAP;
                addPlacedAsset(selectedAssetId, sx, sz, 0, 1, true);
            }
        } else if (currentTool === 'rotate' || currentTool === 'delete') {
            const hits = raycaster.intersectObjects(_collectPlacedMeshes(), false);
            if (hits.length > 0) {
                const pa = _findPlacedFromHit(hits[0].object);
                if (pa) {
                    if (currentTool === 'rotate') {
                        pa.rotation = (pa.rotation || 0) + Math.PI / 2;
                        pa.mesh.rotation.y = pa.rotation;
                        toast(`🔄 ${T('studio.rotated')}`, 'success');
                    } else if (currentTool === 'delete') {
                        scene.remove(pa.mesh);
                        placedAssets = placedAssets.filter(p => p.id !== pa.id);
                        toast(`🗑️ ${T('studio.deleted')}`, 'success');
                    }
                    updatePlacedList();
                }
            }
        }
    });

    // Double-click on desk/table → show agent picker (works regardless of tool)
    canvas.addEventListener('dblclick', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(_collectPlacedMeshes(), false);
        if (hits.length > 0) {
            const pa = _findPlacedFromHit(hits[0].object);
            if (pa && _isAssignableAsset(pa.asset_id)) {
                showDeskAgentPopup(pa, e.clientX, e.clientY);
            }
        }
    });

    window.addEventListener('resize', () => {
        const w = container.clientWidth, h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
}

// ── Asset mesh creation (HQ composite + fallback) ──
function createAssetMesh(assetDef, isGhost = false) {
    // For placed objects (not ghost), try HQ builder first
    if (!isGhost && typeof createHQFurniture === 'function') {
        try {
            const hqGroup = createHQFurniture(assetDef.id, assetDef);
            if (hqGroup) {
                hqGroup.userData.yOff = 0;
                return hqGroup;
            }
        } catch (err) {
            console.error('HQ builder failed for', assetDef.id, err);
            // Fall through to simple primitive
        }
    }

    // Fallback: simple primitive (used for ghost preview and unknown assets)
    const color = new THREE.Color(assetDef.color || '#888888');
    const mat = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.5,
        metalness: 0.1,
        transparent: isGhost,
        opacity: isGhost ? 0.4 : 1,
    });

    let geo;
    const [sx, sy, sz] = assetDef.size || [1, 1, 1];
    switch (assetDef.mesh) {
        case 'cylinder': geo = new THREE.CylinderGeometry(sx, sx, sy, 16); break;
        case 'sphere': geo = new THREE.SphereGeometry(sx, 12, 8); break;
        default: geo = new THREE.BoxGeometry(sx, sy, sz);
    }

    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = !isGhost;
    mesh.receiveShadow = !isGhost;
    mesh.userData.yOff = assetDef.yOffset || 0.5;
    mesh.position.y = assetDef.yOffset || 0.5;

    if (assetDef.emissive && !isGhost) {
        mat.emissive = color;
        mat.emissiveIntensity = 0.5;
    }

    return mesh;
}

function createGhost(assetId) {
    removeGhost();
    const def = assets.find(a => a.id === assetId);
    if (!def) return;
    ghostMesh = createAssetMesh(def, true);
    scene.add(ghostMesh);
}

function removeGhost() {
    if (ghostMesh) { scene.remove(ghostMesh); ghostMesh = null; }
}

// ── Place / Remove ──
let _placeCounter = 0;
function addPlacedAsset(assetId, x, z, rotation, scale, showToast, agentId, agentIds) {
    const def = assets.find(a => a.id === assetId);
    if (!def) return;

    const mesh = createAssetMesh(def);
    // HQ groups use y=0 (builders handle their own offsets), fallback uses yOffset
    const yPos = mesh.userData.yOff || 0;
    mesh.position.set(x, yPos, z);
    mesh.rotation.y = rotation || 0;
    mesh.scale.setScalar(scale || 1);

    const id = 'p_' + (++_placeCounter);
    mesh.userData.placedId = id;
    scene.add(mesh);

    placedAssets.push({ id, asset_id: assetId, x, z, rotation: rotation || 0, scale: scale || 1, mesh, agent_id: agentId || '', agent_ids: agentIds || [] });
    updatePlacedList();
    if (showToast) toast(`📌 ${T('studio.placed_success', {name: def.name})}`, 'success');
}

function removePlacedById(id) {
    const pa = placedAssets.find(p => p.id === id);
    if (pa && pa.mesh) scene.remove(pa.mesh);
    placedAssets = placedAssets.filter(p => p.id !== id);
    updatePlacedList();
}

// ── Asset capacity / assignability helpers ──
const SEAT_CAPACITY = {
    meeting_table_small: 4,
    meeting_table_large: 6,
    conference_table_rect: 8,
    conference_table_oval: 8,
    workstation: 1,
};
function _isMultiSeatAsset(assetId) {
    return (SEAT_CAPACITY[assetId] || 0) > 1;
}
function _isAssignableAsset(assetId) {
    return assetId.startsWith('desk_') || assetId === 'workstation' || _isMultiSeatAsset(assetId);
}
function _getMaxSeats(assetId) {
    if (assetId.startsWith('desk_')) return 1;
    return SEAT_CAPACITY[assetId] || 1;
}
// Collect all agent IDs already assigned across ALL placed assets (except the given excluded placed id)
function _getAllAssignedAgentIds(excludePlacedId) {
    const assigned = new Set();
    placedAssets.forEach(p => {
        if (p.id === excludePlacedId) return;
        if (p.agent_id) assigned.add(p.agent_id);
        if (p.agent_ids && p.agent_ids.length) p.agent_ids.forEach(id => assigned.add(id));
    });
    return assigned;
}

// ── Desk/Table Agent Picker Popup ──
let _popupDeskId = null;
async function showDeskAgentPopup(pa, clientX, clientY) {
    _popupDeskId = pa.id;
    const popup = document.getElementById('desk-agent-popup');
    const list = document.getElementById('desk-agent-popup-list');
    const header = document.querySelector('.desk-agent-popup-header');

    const isMulti = _isMultiSeatAsset(pa.asset_id);
    const maxSeats = _getMaxSeats(pa.asset_id);
    const currentIds = isMulti ? (pa.agent_ids || []) : (pa.agent_id ? [pa.agent_id] : []);
    const assignedElsewhere = _getAllAssignedAgentIds(pa.id);

    // Update header
    if (isMulti) {
        header.innerHTML = `🤖 Gán agents <span class="capacity-badge">${currentIds.length}/${maxSeats} ghế</span>`;
    } else {
        header.innerHTML = '🤖 Gán agent cho bàn này';
    }

    // Get agents of the currently selected team
    let teamAgents = [];
    if (currentTeamId) {
        try {
            const teamRes = await fetch(`${API}/multi-agents/teams/${currentTeamId}`);
            const teamData = await teamRes.json();
            const nodes = teamData.nodes || [];
            const agentIds = nodes.map(n => n.agent_id).filter(Boolean);
            teamAgents = studioAgents.filter(a => agentIds.includes(a.id));
        } catch (e) { teamAgents = studioAgents; }
    }

    let html = '';
    if (isMulti) {
        // ── MULTI-SEAT: checkbox UI ──
        const isFull = currentIds.length >= maxSeats;
        html += `<div class="desk-agent-opt" onclick="clearAllTableAgents('${pa.id}')" style="border-bottom:1px solid var(--card-border);">❌ Bỏ gán tất cả</div>`;
        teamAgents.forEach(ag => {
            const isChecked = currentIds.includes(ag.id);
            const isTaken = assignedElsewhere.has(ag.id);
            let takenAt = '', takenPaId = '';
            if (isTaken) {
                const otherPa = placedAssets.find(p => p.id !== pa.id && ((p.agent_ids || []).includes(ag.id) || p.agent_id === ag.id));
                if (otherPa) {
                    const otherDef = assets.find(a => a.id === otherPa.asset_id);
                    takenAt = otherDef?.name || otherPa.asset_id;
                    takenPaId = otherPa.id;
                }
            }
            const canCheck = isChecked || (!isFull && !isTaken);
            const disabledClass = !canCheck && !isTaken ? 'full-disabled' : '';
            const checkedAttr = isChecked ? 'checked' : '';
            const disabledAttr = !canCheck ? 'disabled' : '';
            html += `<div class="desk-agent-opt ${isChecked ? 'active' : ''} ${disabledClass}">
                <label>
                    <input type="checkbox" ${checkedAttr} ${disabledAttr}
                        onchange="toggleTableAgent('${ag.id}', '${pa.id}', this.checked)">
                    <span class="agent-dot ${isTaken ? 'taken' : ''}"></span>
                    ${ag.name}
                </label>
                ${isTaken ? `<span class="taken-badge">📌 ${takenAt}</span><span class="release-btn" onclick="event.stopPropagation(); releaseAgentFromOther('${ag.id}', '${takenPaId}', '${pa.id}')">🔓 Huỷ gán</span>` : ''}
            </div>`;
        });
    } else {
        // ── SINGLE-SEAT: original radio-style UI ──
        html += `<div class="desk-agent-opt ${!pa.agent_id ? 'active' : ''}" onclick="pickDeskAgent('', '${pa.id}')">❌ Bỏ gán</div>`;
        teamAgents.forEach(ag => {
            const isActive = pa.agent_id === ag.id;
            const isTaken = assignedElsewhere.has(ag.id);
            let takenAt = '', takenPaId = '';
            if (isTaken) {
                const otherPa = placedAssets.find(p => p.id !== pa.id && ((p.agent_ids || []).includes(ag.id) || p.agent_id === ag.id));
                if (otherPa) {
                    const otherDef = assets.find(a => a.id === otherPa.asset_id);
                    takenAt = otherDef?.name || otherPa.asset_id;
                    takenPaId = otherPa.id;
                }
            }
            html += `<div class="desk-agent-opt ${isActive ? 'active' : ''}" onclick="${isTaken && !isActive ? '' : `pickDeskAgent('${ag.id}', '${pa.id}')`}">
                <span class="agent-dot ${isTaken ? 'taken' : ''}"></span>${ag.name}
                ${isTaken && !isActive ? `<span class="taken-badge">📌 ${takenAt}</span><span class="release-btn" onclick="event.stopPropagation(); releaseAgentFromOther('${ag.id}', '${takenPaId}', '${pa.id}')">🔓 Huỷ gán</span>` : ''}
            </div>`;
        });
    }

    if (teamAgents.length === 0) {
        html += `<div class="desk-agent-opt" style="color:#64748b;cursor:default;">Chưa có agent nào trong team</div>`;
    }
    list.innerHTML = html;

    // Position popup (keep within viewport)
    const popW = 280, popH = 350;
    let px = clientX, py = clientY;
    if (px + popW > window.innerWidth) px = window.innerWidth - popW - 10;
    if (py + popH > window.innerHeight) py = window.innerHeight - popH - 10;
    popup.style.left = px + 'px';
    popup.style.top = py + 'px';
    popup.classList.add('open');
}

// Toggle agent in multi-seat table
function toggleTableAgent(agentId, placedId, checked) {
    const pa = placedAssets.find(p => p.id === placedId);
    if (!pa) return;
    if (!pa.agent_ids) pa.agent_ids = [];
    const maxSeats = _getMaxSeats(pa.asset_id);

    if (checked) {
        if (pa.agent_ids.length >= maxSeats) {
            toast(`⚠️ Bàn này đã đủ ${maxSeats} người!`, 'error');
            return;
        }
        if (!pa.agent_ids.includes(agentId)) {
            pa.agent_ids.push(agentId);
        }
    } else {
        pa.agent_ids = pa.agent_ids.filter(id => id !== agentId);
    }
    const agent = studioAgents.find(a => a.id === agentId);
    toast(checked ? `🤖 Đã thêm ${agent?.name || agentId}` : `Đã bỏ ${agent?.name || agentId}`, 'success');
    updatePlacedList();
    // Re-render popup to update capacity badge and checkbox states
    showDeskAgentPopup(pa, parseInt(document.getElementById('desk-agent-popup').style.left), parseInt(document.getElementById('desk-agent-popup').style.top));
}

// Clear all agents from a multi-seat table
function clearAllTableAgents(placedId) {
    const pa = placedAssets.find(p => p.id === placedId);
    if (pa) {
        pa.agent_ids = [];
        toast('Đã bỏ gán tất cả agent', 'success');
        updatePlacedList();
    }
    closeDeskAgentPopup();
}

// Release agent from another table/desk (unassign from its current location)
function releaseAgentFromOther(agentId, otherPlacedId, currentPopupPlacedId) {
    const otherPa = placedAssets.find(p => p.id === otherPlacedId);
    if (!otherPa) return;
    const agent = studioAgents.find(a => a.id === agentId);
    const otherDef = assets.find(a => a.id === otherPa.asset_id);

    // Remove from single-seat assignment
    if (otherPa.agent_id === agentId) {
        otherPa.agent_id = '';
    }
    // Remove from multi-seat assignment
    if (otherPa.agent_ids && otherPa.agent_ids.includes(agentId)) {
        otherPa.agent_ids = otherPa.agent_ids.filter(id => id !== agentId);
    }

    toast(`🔓 Đã huỷ gán ${agent?.name || agentId} khỏi ${otherDef?.name || otherPlacedId}`, 'success');
    updatePlacedList();

    // Re-render the current popup to show the now-available agent
    const currentPa = placedAssets.find(p => p.id === currentPopupPlacedId);
    if (currentPa) {
        const popup = document.getElementById('desk-agent-popup');
        showDeskAgentPopup(currentPa, parseInt(popup.style.left), parseInt(popup.style.top));
    }
}

function pickDeskAgent(agentId, placedId) {
    const pa = placedAssets.find(p => p.id === placedId);
    if (pa) {
        pa.agent_id = agentId;
        const agent = studioAgents.find(a => a.id === agentId);
        toast(agentId ? `🤖 Đã gán ${agent?.name || agentId} cho bàn` : 'Đã bỏ gán agent', 'success');
        updatePlacedList();
    }
    closeDeskAgentPopup();
}

function closeDeskAgentPopup() {
    document.getElementById('desk-agent-popup').classList.remove('open');
    _popupDeskId = null;
}

// Close popup when clicking outside
document.addEventListener('click', (e) => {
    const popup = document.getElementById('desk-agent-popup');
    if (popup.classList.contains('open') && !popup.contains(e.target)) {
        closeDeskAgentPopup();
    }
}, true);

function clearScene() {
    if (!confirm('Xóa hết tất cả vật phẩm?')) return;
    clearAllMeshes();
    updatePlacedList();
    toast('🧹 Đã xóa hết', 'success');
}

function clearAllMeshes() {
    placedAssets.forEach(p => { if (p.mesh) scene.remove(p.mesh); });
    placedAssets = [];
}

function updatePlacedList() {
    document.getElementById('placed-count').textContent = placedAssets.length;
    const list = document.getElementById('placed-list');
    list.innerHTML = placedAssets.map(p => {
        const def = assets.find(a => a.id === p.asset_id);
        const isDesk = p.asset_id.startsWith('desk_');
        const isMulti = _isMultiSeatAsset(p.asset_id);
        const isAssignable = _isAssignableAsset(p.asset_id);

        let agentOpts = '';
        let agentBadge = '';

        if (isMulti) {
            // Multi-seat: show count badge
            const count = (p.agent_ids || []).length;
            const max = _getMaxSeats(p.asset_id);
            agentBadge = count > 0 ? `<span style="font-size:9px;color:#22d3ee;background:rgba(34,211,238,0.15);padding:1px 5px;border-radius:8px;">${count}/${max}🤖</span>` : '';
        } else if (isDesk || p.asset_id === 'workstation') {
            // Single-seat: dropdown + badge
            agentOpts = `<select class="agent-assign-select" onchange="assignAgentToDesk('${p.id}', this.value)" title="Gán agent">
                <option value="">-- Chưa gán --</option>
                ${studioAgents.map(ag => `<option value="${ag.id}" ${p.agent_id === ag.id ? 'selected' : ''}>${ag.name}</option>`).join('')}
            </select>`;
            agentBadge = p.agent_id ? `<span style="font-size:10px;color:#22d3ee;">🤖</span>` : '';
        }

        return `<div class="placed-item">
            <span>${def?.emoji || '📦'} ${agentBadge}</span>
            <span class="pi-name">${def?.name || p.asset_id}</span>
            ${agentOpts}
            <button onclick="removePlacedById('${p.id}')" title="Xóa">✕</button>
        </div>`;
    }).join('');
    if (typeof applyI18n === 'function') setTimeout(applyI18n, 10);
}

function assignAgentToDesk(placedId, agentId) {
    const pa = placedAssets.find(p => p.id === placedId);
    if (pa) {
        pa.agent_id = agentId;
        const agent = studioAgents.find(a => a.id === agentId);
        toast(agentId ? `🤖 Đã gán ${agent?.name || agentId} cho bàn` : 'Đã bỏ gán agent', 'success');
    }
}

function openAIGenerateModal() {

        toast('⚠️ Vui lòng chọn Team trước khi dùng AI!', 'error');

function onAiProviderChange() {

    const m = document.getElementById('ai-model-input');

    else if (p === 'claude') m.value = 'claude-3-haiku-20240307';

async function submitAiGenerate() {
    const prompt = document.getElementById('ai-prompt-input').value.trim();
    if (!prompt) { toast('Bạn chưa nhập mô tả!', 'error'); return; }
    
    document.getElementById('btn-ai-generate').disabled = true;
    document.getElementById('btn-ai-generate').style.opacity = '0.5';
    document.getElementById('ai-gen-status').style.display = 'block';
    
    try {
        const res = await fetch(`${API}/studio3d/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                team_id: currentTeamId,
                prompt: prompt,
                room_width: roomW,
                room_depth: roomD,
                provider: document.getElementById('ai-provider-select').value,
                model: document.getElementById('ai-model-input').value
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Lỗi API');
        
        // Success
        const layout = data.result;
        if (layout.room_resize) {
            document.getElementById('room-width').value = layout.room_resize.room_width || roomW;
            document.getElementById('room-depth').value = layout.room_resize.room_depth || roomD;
            resizeRoom();
        }
        
        clearAllMeshes(); // Clear old room
        
        // ── Post-process: fix orientations with real math ──
        const items = layout.assets || [];
        const desks = items.filter(a => a.asset_id.startsWith('desk_'));
        const chairs = items.filter(a => a.asset_id.startsWith('chair_'));
        const monitors = items.filter(a => a.asset_id === 'monitor');
        
        // For each chair, find nearest desk and rotate chair to FACE it
        chairs.forEach(chair => {
            let minDist = Infinity, nearestDesk = null;
            desks.forEach(d => {
                const dist = Math.hypot(d.x - chair.x, d.z - chair.z);
                if (dist < minDist) { minDist = dist; nearestDesk = d; }
            });
            if (nearestDesk && minDist < 3) {
                // atan2 gives the angle FROM chair TO desk
                // Chair model faces +Z at rotation=0, so we need angle - PI to make front face the desk
                chair.rotation = Math.atan2(nearestDesk.x - chair.x, nearestDesk.z - chair.z);
            }
        });
        
        // For each monitor, find nearest desk, then find the chair for that desk
        // Monitor should face AWAY from desk center (towards the person sitting)
        monitors.forEach(mon => {
            let minDist = Infinity, nearestDesk = null;
            desks.forEach(d => {
                const dist = Math.hypot(d.x - mon.x, d.z - mon.z);
                if (dist < minDist) { minDist = dist; nearestDesk = d; }
            });
            if (nearestDesk && minDist < 3) {
                // Find the chair that belongs to this desk
                let nearestChair = null, minChairDist = Infinity;
                chairs.forEach(c => {
                    const dist = Math.hypot(c.x - nearestDesk.x, c.z - nearestDesk.z);
                    if (dist < minChairDist) { minChairDist = dist; nearestChair = c; }
                });
                if (nearestChair) {
                    // Monitor screen faces +Z at rotation=0
                    // We want screen to face the chair (person)
                    mon.rotation = Math.atan2(nearestChair.x - mon.x, nearestChair.z - mon.z);
                }
            }
        });
        
        items.forEach(a => {
            addPlacedAsset(a.asset_id, a.x, a.z, a.rotation || 0, 1, false, a.agent_id || '');
        });
        updatePlacedList();
        
        closeAIGenerateModal();
        toast('✨ Đã thiết kế xong phòng bằng AI!', 'success');
        saveScene(); // Auto-save after generate
    } catch (e) {
        toast('Lỗi tạo bằng AI: ' + e.message, 'error');
        document.getElementById('ai-gen-status').style.display = 'none';
        document.getElementById('btn-ai-generate').disabled = false;
        document.getElementById('btn-ai-generate').style.opacity = '1';
    }
}

            })
        });
        const data = await res.json();

        // Refresh team list and auto-select new team

function toast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
}
